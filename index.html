<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER Marketing | Auditoria de Lucro Invisível</title>
  <link rel="icon" type="image/png" href="/assets/red-logo.png" />

  <!-- Inline base styles — prevents the white flash between HTML arrival and
       the hashed CSS bundle, and gives the LCP element a correct background
       on first paint (FCP). -->
  <style>
    html, body { background-color: #111112; color: #F5F1E8; margin: 0; }
    #root { min-height: 100vh; background-color: #111112; }
  </style>

  <!-- Preconnect to the R2 video CDN used above-the-fold on /restaurantes-manaus
       and the main LP hero. Saves TLS/DNS on the first byte of video metadata. -->
  <link rel="preconnect" href="https://pub-a56d220bf5884e95b4762d77d7556734.r2.dev" />

  <!-- Desktop-only preload of the pizza photo. On >=lg the collage IS in
       viewport on first paint and the photo is the LCP candidate there.
       Mobile preload of the Taychi poster was REMOVED — that image is now
       a `lg:hidden` static <img> rendered AFTER the H1 + CTAs in the mobile
       layout, so it's not the LCP candidate (the H1 is, with preloaded
       Playfair). Preloading it at high priority was costing ~150 ms of
       contended bandwidth against the actual critical-path resources
       (fonts + critical CSS) without contributing to LCP. The mobile <img>
       now uses loading="lazy" so it fetches only when scrolled near. -->
  <link rel="preload" as="image" type="image/avif" href="/photos-food/p-1.avif" media="(min-width: 769px)" fetchpriority="high" />

  <!-- Third-party tags (GTM, Flowdesk pixel, Meta Pixel) are deferred until
       after the page is interactive. They still fire within the user's session
       but don't compete with React hydration / image decode for the initial
       LCP/FCP window. The fbq + dataLayer queues are stubbed synchronously so
       any in-app push() during boot is captured and replayed on flush. -->
  <script>
    // Stub queues so app code can push events before the real scripts load.
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
    !function (f, b, e, v, n) {
      if (f.fbq) return; n = f.fbq = function () { n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments) };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0'; n.queue = [];
    }(window);
    fbq('init', '339396175425796');
    fbq('track', 'PageView');

    // Defer real loaders to first idle slot after `load`, so they never compete
    // with the LCP image / hero JS. ~1.5s extra delay vs synchronous fire.
    function __loadThirdPartyTags() {
      // GTM
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-MLK59QPC';
      document.head.appendChild(s);
      // Flowdesk
      var f = document.createElement('script');
      f.async = true;
      f.src = 'https://flowdesk-flowdesk-app.rikvu5.easypanel.host/pixel.js?id=63f4f20b-41a3-46fb-94d8-942c3344a730&link=sknyr4';
      document.head.appendChild(f);
      // Meta Pixel
      var m = document.createElement('script');
      m.async = true;
      m.src = 'https://connect.facebook.net/en_US/fbevents.js';
      document.head.appendChild(m);
    }
    function __schedulePixels() {
      if ('requestIdleCallback' in window) {
        requestIdleCallback(__loadThirdPartyTags, { timeout: 2500 });
      } else {
        setTimeout(__loadThirdPartyTags, 1500);
      }
    }
    if (document.readyState === 'complete') {
      __schedulePixels();
    } else {
      window.addEventListener('load', __schedulePixels, { once: true });
    }
  </script>
</head>

<body>
  <!-- Meta Pixel noscript fallback -->
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=339396175425796&ev=PageView&noscript=1" alt="" /></noscript>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
